---
# Service для Backend (внутренний, ClusterIP)
apiVersion: v1
kind: Service
metadata:
  name: vm-inventory-backend
  namespace: vm-inventory
  labels:
    app: vm-inventory-backend
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: vm-inventory-backend
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
