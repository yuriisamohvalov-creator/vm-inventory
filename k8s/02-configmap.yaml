---
# ConfigMap с переменными окружения для приложения
apiVersion: v1
kind: ConfigMap
metadata:
  name: vm-inventory-config
  namespace: vm-inventory
data:
  # Django основные настройки
  DEBUG: "false"
  ALLOWED_HOSTS: "vm-inventory.example.com,localhost"
  
  # Database (подключение к внешнему серверу БД)
  DATABASE_HOST: "postgres.example.com"  # IP или домен сервера БД
  DATABASE_PORT: "5432"
  DATABASE_NAME: "vminventory"
  DATABASE_USER: "vminventory"
  
  # LDAP (опционально, оставить пусто если не используется)
  LDAP_URI: ""
  LDAP_BIND_DN: ""
  LDAP_USER_SEARCH_BASE: ""
  LDAP_GROUPS_BASE: ""
  LDAP_ROLE_GROUP_MAP: ""
  
  # Другие настройки
  LOG_LEVEL: "INFO"
  SECURE_SSL_REDIRECT: "false"  # Установить true если используется HTTPS
