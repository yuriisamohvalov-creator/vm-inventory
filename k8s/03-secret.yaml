---
# Secret с конфиденциальными данными
apiVersion: v1
kind: Secret
metadata:
  name: vm-inventory-secret
  namespace: vm-inventory
type: Opaque
stringData:
  # Django
  SECRET_KEY: "django-insecure-change-this-in-production-use-secure-random-key"
  
  # Database credentials (внешний сервер БД)
  DATABASE_PASSWORD: "your-secure-db-password"
  
  # LDAP (если используется)
  LDAP_BIND_PASSWORD: ""
  
  # Bootstrap пользователь при первом запуске
  AUTH_BOOTSTRAP_USERNAME: "admin"
  AUTH_BOOTSTRAP_PASSWORD: "change-me-after-first-login"
  AUTH_BOOTSTRAP_ROLE: "admin"
