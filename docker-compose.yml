version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vminventory}
      POSTGRES_USER: ${POSTGRES_USER:-vminventory}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vminventory_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vminventory} -d ${POSTGRES_DB:-vminventory}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput --clear &&
             gunicorn vm_inventory.wsgi:application --bind 0.0.0.0:8000 --workers 2"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-vminventory}:${POSTGRES_PASSWORD:-vminventory_secret}@db:5432/${POSTGRES_DB:-vminventory}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      DEBUG: ${DEBUG:-false}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,backend,nginx}
      LDAP_URI: ${LDAP_URI:-}
      LDAP_BIND_DN: ${LDAP_BIND_DN:-}
      LDAP_BIND_PASSWORD: ${LDAP_BIND_PASSWORD:-}
      LDAP_USER_SEARCH_BASE: ${LDAP_USER_SEARCH_BASE:-}
      LDAP_GROUPS_BASE: ${LDAP_GROUPS_BASE:-}
      LDAP_ROLE_GROUP_MAP: ${LDAP_ROLE_GROUP_MAP:-}
    volumes:
      - static_volume:/app/staticfiles
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/admin/login/')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - frontend_build:/app/dist
    healthcheck:
      test: ["CMD-SHELL", "test -f /app/dist/index.html"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s
    restart: unless-stopped

  nginx:
    build: ./nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/var/www/static:ro
      - frontend_build:/var/www/frontend:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  static_volume:
  frontend_build:
