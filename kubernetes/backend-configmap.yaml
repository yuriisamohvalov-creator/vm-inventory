apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
data:
  ALLOWED_HOSTS: "localhost,127.0.0.1,backend,nginx"
  DEBUG: "false"
  # PostgreSQL connection settings for external cluster
  POSTGRES_HOST: "postgresql-external-cluster.example.com"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "vminventory"
  POSTGRES_USER: "vminventory"
  # LDAP settings (optional)
  LDAP_URI: ""
  LDAP_BIND_DN: ""
  LDAP_USER_SEARCH_BASE: ""
  LDAP_GROUPS_BASE: ""