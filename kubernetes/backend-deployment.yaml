apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: vm-inventory-backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: backend-config
        - secretRef:
            name: backend-secrets
        volumeMounts:
        - name: static-volume
          mountPath: /app/staticfiles
        command: ["sh", "-c"]
        args:
          - python manage.py migrate --noinput &&
            python manage.py collectstatic --noinput --clear &&
            gunicorn vm_inventory.wsgi:application --bind 0.0.0.0:8000 --workers 2
        livenessProbe:
          httpGet:
            path: /api/
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
      volumes:
      - name: static-volume
        persistentVolumeClaim:
          claimName: static-pvc